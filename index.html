<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thauyel VPS — Services</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.4rem;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #666;
      font-size: 0.75rem;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-value {
      font-size: 1.4rem;
      color: #fff;
      font-weight: bold;
    }

    .stat-value .sub {
      font-size: 0.75rem;
      color: #555;
      font-weight: normal;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      max-width: 960px;
    }

    .service {
      background: #141418;
      border: 1px solid #222228;
      border-radius: 6px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .service-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .service-name {
      font-size: 0.9rem;
      color: #fff;
    }

    .service-detail {
      font-size: 0.65rem;
      color: #444;
    }

    .status-badge {
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .status-badge.online {
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .status-badge.offline {
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .footer {
      margin-top: 50px;
      font-size: 0.65rem;
      color: #333;
    }

    #last-updated { color: #444; }
  </style>
</head>
<body>

  <h1>THAUYEL.VPS</h1>
  <p class="subtitle">VPS Service Status &mdash; Milan, OVHcloud</p>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-disk">--</span>
      <span class="stat-label">Disk</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-ram">--</span>
      <span class="stat-label">RAM</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-cpu">--</span>
      <span class="stat-label">CPU</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-load">--</span>
      <span class="stat-label">Load (1m)</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-uptime">--</span>
      <span class="stat-label">Uptime</span>
    </div>
  </div>

  <div class="services" id="services">
    <!-- Populated by JS -->
  </div>

  <p class="footer">
    Last updated: <span id="last-updated">--</span> &mdash; Auto-refresh every 30s
  </p>

  <script>
    const SERVICES = [
      { key: 'minecraft', name: 'Minecraft Server', detail: 'Port 25565 \u2014 Paper MC',      screen: 'polimc' },
      { key: 'gmod',      name: 'GMod Server',       detail: 'Port 27015 \u2014 TTT',         screen: 'gmod' },
      { key: 'terraria',  name: 'Terraria Server',   detail: 'Port 7777 \u2014 tmodloader',   screen: 'terraria' },
      { key: 'pqr',       name: 'pqr',                detail: 'Port 5001 \u2014 Polimi QR',    always_on: true },
      { key: 'dcbot',     name: 'dcbot',              detail: 'Discord bot',                  always_on: true },
      { key: 'hermes',    name: 'Hermes Agent',       detail: 'AI assistant',                 always_on: true },
      { key: 'nginx',     name: 'Nginx',              detail: 'Port 80/443 \u2014 thauyel.com', always_on: true },
      { key: 'cups',      name: 'CUPS',               detail: 'Port 631 \u2014 Print server',  always_on: true },
      { key: 'ssh',       name: 'SSH',                detail: 'Port 22',                      always_on: true },
    ];

    function badge(s) {
      return `<span class="status-badge ${s}">${s}</span>`;
    }

    function renderServices(services, data) {
      const el = document.getElementById('services');
      el.innerHTML = services.map(svc => {
        let online;
        if (svc.always_on) {
          online = true;
        } else if (svc.screen && data[svc.key] !== undefined) {
          online = data[svc.key].online;
        }
        return `<div class="service">
          <div class="service-info">
            <span class="service-name">${svc.name}</span>
            <span class="service-detail">${svc.detail}</span>
          </div>
          ${badge(online ? 'online' : 'offline')}
        </div>`;
      }).join('');
    }

    function formatUptime(seconds) {
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      if (days > 0) return `${days}d ${hours}h`;
      const mins = Math.floor((seconds % 3600) / 60);
      return `${hours}h ${mins}m`;
    }

    function update() {
      fetch('/status')
        .then(r => r.json())
        .then(data => {
          renderServices(SERVICES, data);

          const s = data.system || {};
          const diskUsed = s.disk_used_gb !== undefined ? s.disk_used_gb : '--';
          const diskTotal = s.disk_total_gb !== undefined ? s.disk_total_gb : '--';
          const ramUsed = s.ram_used_gb !== undefined ? s.ram_used_gb : '--';
          const ramTotal = s.ram_total_gb !== undefined ? s.ram_total_gb : '--';

          document.getElementById('stat-disk').textContent =
            diskTotal ? `${diskUsed} / ${diskTotal} GB` : `${diskUsed} GB`;
          document.getElementById('stat-ram').textContent =
            ramTotal ? `${ramUsed} / ${ramTotal} GB` : `${ramUsed} GB`;
          document.getElementById('stat-cpu').textContent =
            s.cpu_pct !== undefined ? `${s.cpu_pct}%` : '--';
          document.getElementById('stat-load').textContent =
            s.load_1m !== undefined ? s.load_1m : '--';

          if (s.load_1m !== undefined) {
            document.getElementById('stat-uptime').textContent = '--';
          }

          document.getElementById('last-updated').textContent =
            new Date().toLocaleTimeString();
        })
        .catch(() => {});
    }

    update();
    setInterval(update, 30000);
  </script>

</body>
</html>
